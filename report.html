<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGIL | Submit Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">
    <nav class="navbar border-bottom border-secondary px-4">
        <a class="navbar-brand text-danger fw-bold" href="index.html">VIGIL</a>
        <div class="ms-auto d-flex gap-4">
            <a href="index.html" class="text-white text-decoration-none">DASHBOARD</a>
            <a href="report.html" class="text-white text-decoration-none border-bottom border-danger">REPORT</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card bg-dark border-secondary p-4 w-100" style="max-width: 600px;">
            <h3 class="fw-bold mb-1">SUBMIT FLASH REPORT</h3>
            <p class="text-secondary small mb-4">ENCRYPTED UPLOAD // ZONE 4-ALPHA</p>
            
            <label class="small opacity-50 text-uppercase mb-2">GPS Coordinates</label>
            <input type="text" id="coords" class="form-control bg-black border-secondary text-white mb-4 py-3" readonly>

            <label class="small opacity-50 text-uppercase mb-2">Incident Classification</label>
            <div class="d-flex gap-2 mb-4">
                <button onclick="setType(this, 'Fire')" class="btn btn-outline-secondary w-25 class-btn">FIRE</button>
                <button onclick="setType(this, 'Flood')" class="btn btn-outline-secondary w-25 class-btn">FLOOD</button>
                <button onclick="setType(this, 'Medical')" class="btn btn-outline-secondary w-25 class-btn">MEDICAL</button>
                <button onclick="setType(this, 'Other')" class="btn btn-outline-secondary w-25 class-btn">OTHER</button>
            </div>

            <label class="small opacity-50 text-uppercase mb-2">Situation Report</label>
            <textarea id="sitReport" class="form-control bg-black border-secondary text-white mb-4" rows="4" placeholder="DESCRIBE CONDITIONS..."></textarea>

            <button onclick="validateReport()" class="btn btn-danger py-3 fw-bold w-100">SUBMIT REPORT — HOLD TO CONFIRM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
