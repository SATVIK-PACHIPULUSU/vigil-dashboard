<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="VIGIL: Visual Intelligence & Geographic Incident Logging. Tactical disaster monitoring.">
    <title>VIGIL | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-shield-halved"></i> VIGIL <small>LIVE</small></div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">DASHBOARD</a></li>
            <li><a href="report.html">REPORT</a></li>
            <li><a href="contacts.html">CONTACTS</a></li>
        </ul>
        <div id="clock" class="system-time">00:00:00 HRS</div>
    </nav>

    <div class="dashboard-grid">
        <aside class="sidebar">
            <h3>LIVE INTEL</h3>
            <div id="alerts-list">
            </div>
        </aside>
        <main class="map-container">
            <div id="map"></div>
            <div class="map-overlay-stats">
                <div class="stat"><span class="val">12</span><span class="lbl">UNITS</span></div>
                <div class="stat"><span class="val">03</span><span class="lbl">ACTIVE</span></div>
            </div>
        </main>
    </div>

    <footer class="ticker-wrap">
        <div class="ticker-label">INTEL</div>
        <div class="ticker" id="ticker-content"></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="alerts.js"></script>
    <script src="script.js"></script>
</body>

</html>
